---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
  namespace: open-wearables
  labels:
    app: celery-beat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-beat-service
  template:
    metadata:
      labels:
        app: celery-beat-service
    spec:
      containers:
        - name: celery-beat
          image: ghcr.io/flordebruyne/open-wearables:latest
          imagePullPolicy: Always
          command: ["/bin/sh", "-c", "scripts/start/beat.sh"]
          envFrom:
            - secretRef:
                name: backend-secret
