---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postgres-release
  namespace: open-wearables
spec:
  interval: 10m
  chart:
    spec:
      chart: postgresql
      version: v18.7.0
      sourceRef:
        kind: HelmRepository
        name: postgres-repo
        namespace: open-wearables
  install:
    createNamespace: true

  values:
    auth:
      existingSecret: postgres-auth

    primary:
      persistence:
        enabled: true
        storageClass: longhorn
        size: 50Gi
