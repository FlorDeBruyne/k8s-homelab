---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agent-ingress
  namespace: ai-agent
spec:
  ingressClassName: nginx
  rules:
    - host: api.ai-agent.homelab.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agent-service
                port:
                  number: 11434
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agent-ingress-ip
  namespace: ai-agent
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: agent-service
                port:
                  number: 11434