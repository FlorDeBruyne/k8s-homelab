---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agent-ingress
  namespace: ai-agent
spec:
  ingressClassName: nginx
  rules:
    - host: api.ai-agent.homelab.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agent-service
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agent-ingress-ip
  namespace: ai-agent
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /agent-api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: agent-service
                port:
                  number: 80