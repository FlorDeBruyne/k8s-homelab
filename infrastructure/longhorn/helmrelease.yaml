---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn-release
  namespace: longhorn-system
spec:
  interval: 10m
  chart:
    spec:
      chart: longhorn
      version: v1.11.2
      sourceRef:
        kind: HelmRepository
        name: longhorn-repo
        namespace: longhorn-system
  install:
    createNamespace: true