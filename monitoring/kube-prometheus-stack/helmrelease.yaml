---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: monitoring-release
  namespace: monitoring-system
spec:
  interval: 10m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 86.1.0
      sourceRef:
        kind: HelmRepository
        name: monitoring-repo
        namespace: monitoring-system
  install:
    createNamespace: true